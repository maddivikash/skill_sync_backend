# Production override for the single EC2 host — HTTPS via Caddy.
# Run with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Caddy fronts everything (80/443/8443) and auto-manages Let's Encrypt certs
# for skillsync-io.duckdns.org. web + api are reached over the internal network.
services:
  db:
    restart: unless-stopped

  api:
    environment:
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      APP_ENV: prod
      # Same-origin now (relative /api), but list both hosts for safety.
      CORS_ORIGINS: "https://ascenddaily.in,https://skillsync-io.duckdns.org"
      # Password-reset links point at the live frontend.
      FRONTEND_URL: "https://ascenddaily.in"
      # AI coach (Groq). GROQ_API_KEYS = comma-separated keys (rotated on limits).
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_API_KEYS: ${GROQ_API_KEYS:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      # Email (Gmail SMTP). Only the password is secret (from host .env).
      SMTP_HOST: "smtp.gmail.com"
      SMTP_PORT: "587"
      SMTP_USER: "skillsync.mailer@gmail.com"
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: "Ascend <skillsync.mailer@gmail.com>"
    restart: unless-stopped

  web:
    build:
      args:
        # Relative same-origin API — works on ANY domain the app is served from
        # (ascenddaily.in or the duckdns fallback). Caddy strips /api.
        VITE_API_URL: "/api"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
