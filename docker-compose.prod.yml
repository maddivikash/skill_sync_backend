# Production override for the single EC2 host — HTTPS via Caddy.
# Run with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Caddy fronts everything (80/443/8443) and auto-manages Let's Encrypt certs
# for skillsync-io.duckdns.org. web + api are reached over the internal network.
services:
  db:
    restart: unless-stopped

  api:
    environment:
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      APP_ENV: prod
      # Allow the HTTPS frontend origin (and the raw IP during transition).
      CORS_ORIGINS: "https://skillsync-io.duckdns.org,http://3.109.158.246"
      # Password-reset links point at the live frontend.
      FRONTEND_URL: "https://skillsync-io.duckdns.org"
    restart: unless-stopped

  web:
    build:
      args:
        # Frontend calls the API over HTTPS on port 8443.
        VITE_API_URL: "https://skillsync-io.duckdns.org:8443"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
