# Production override for the single EC2 host.
# Run with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# NOTE: the EC2 public IP is baked into the frontend at build time. If the
# instance is stopped/started the IP changes — update PUBLIC_HOST below and
# rebuild web. (Allocate an Elastic IP later for a stable address.)
services:
  db:
    restart: unless-stopped

  api:
    environment:
      # SECRET_KEY comes from the .env file on the host (never commit a real one).
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      APP_ENV: prod
      # Browser origin of the frontend (served on port 80, so no port suffix).
      CORS_ORIGINS: "http://3.109.158.246"
    restart: unless-stopped

  web:
    build:
      args:
        # Frontend calls the API at the host's public IP, port 8000.
        VITE_API_URL: "http://3.109.158.246:8000"
    # Serve the frontend on port 80 (open in the security group).
    ports:
      - "80:80"
    restart: unless-stopped
